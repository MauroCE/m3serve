name: CI

on:
  push:
  pull_request:

jobs:
  lint-type-test:
    name: lint-type-test (transformers ${{ matrix.major }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { major: "4", spec: ">=4.44,<5" }
          - { major: "5", spec: ">=5,<6" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies (including dev)
        run: uv sync --dev

      - name: Pin transformers (matrix)
        run: uv pip install "transformers${{ matrix.spec }}"

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -v